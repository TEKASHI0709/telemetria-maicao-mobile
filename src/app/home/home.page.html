<ion-content [fullscreen]="true">
  <div class="dashboard-container">
    <div class="futuristic-grid"></div>

    <header class="dash-header">
      <div class="header-info">
        <h1>Panel de Control</h1>
        <p>Telemetría IoT · Maicao</p>
      </div>
      <button class="btn-logout" (click)="onLogout()">
        <span class="logout-icon">⎋</span>
      </button>
    </header>

    <div class="connection-status-card">
      <div class="status-indicator online"></div>
      <div class="status-text">
        <span>Servidor Railway: <strong>Conectado</strong></span>
        <small>Actualización en tiempo real activa</small>
      </div>
    </div>

    <div class="tanks-grid">
      
      <div class="tank-card">
        <div class="card-edge-glow"></div>
        <div class="tank-header">
          <h3>Tanque Principal</h3>
          <span class="tank-badge">ESP32</span>
        </div>
        
        <div class="level-display">
          <span class="percentage-value">85%</span>
          <span class="liters-value">8,500 Lts</span>
        </div>

        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width: 85%"></div>
        </div>

        <div class="tank-footer">
          <span>Último dato: Hace un momento</span>
        </div>
      </div>

    </div>
  </div>
</ion-content>
